name: Build Prompt Data

on:
  push:
    branches: [main]
    paths:
      - 'prompts/**'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build prompts index
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx scripts/build-prompts.ts

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prompts.json
          git diff --cached --quiet || git commit -m "chore: rebuild prompts index"
          git push
